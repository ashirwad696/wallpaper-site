<!DOCTYPE html>
<html>
<head>
  <title>Neon Wallpaper Gallery</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 2.5em;
      margin: 20px;
      color: #0ff;
      text-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
    }
    h2 {
      color: #f0f;
      text-shadow: 0 0 10px #f0f, 0 0 20px #f0f;
      margin-top: 40px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }
    .gallery img {
      width: 250px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,255,255,0.6), 0 0 40px rgba(255,0,255,0.4);
      transition: transform 0.3s, filter 0.3s;
      filter: blur(1px) brightness(1.2);
    }
    .gallery img:hover {
      transform: scale(1.08);
      filter: blur(0px) brightness(1.5);
    }
  </style>
</head>
<body>
  <h1>✨ Neon Wallpaper Gallery ✨</h1>

  <h2>Minimalist</h2>
  <div class="gallery">
    <img src="minimalist/wallpaper1.jpg" alt="Minimalist 1">
    <img src="minimalist/wallpaper2.jpg" alt="Minimalist 2">
  </div>

  <h2>Festival</h2>
  <div class="gallery">
    <img src="festival/wallpaper1.jpg" alt="Festival 1">
    <img src="festival/wallpaper2.jpg" alt="Festival 2">
  </div>

  <h2>Anime</h2>
  <div class="gallery">
    <img src="anime/wallpaper1.jpg" alt="Anime 1">
    <img src="anime/wallpaper2.jpg" alt="Anime 2">
  </div>

  <h2>Nature</h2>
  <div class="gallery">
    <img src="nature/wallpaper1.jpg" alt="Nature 1">
    <img src="nature/wallpaper2.jpg" alt="Nature 2">
  </div>

</body>
</html>
