<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wallpaper Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #0ff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    h1 {
      font-size: 4rem;
      text-align: center;
      margin-top: 12vh;
      text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% {
        text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
      }
      100% {
        text-shadow: 0 0 30px #0ff, 0 0 50px #0ff, 0 0 70px #0ff;
      }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 60px;
      padding: 20px;
    }

    .card {
      background: rgba(0, 20, 20, 0.7);
      border: 1px solid #0ff;
      border-radius: 16px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      text-shadow: 0 0 10px #0ff;
      transition: all 0.4s ease;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, transparent, rgba(0, 255, 255, 0.1));
      transform: rotate(30deg);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .card:hover {
      background: rgba(0, 30, 30, 0.9);
      transform: translateY(-10px);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
    }

    .card:hover::before {
      opacity: 1;
    }

    .anime {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(20, 0, 40, 0.8));
      border: 1px solid #ff00ff;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
    }

    .nature {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 40, 0, 0.8));
      border: 1px solid #00ff00;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
    }

    .minimalist {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(30, 30, 30, 0.8));
      border: 1px solid #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      color: #fff;
    }

    .festival {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(40, 0, 20, 0.8));
      border: 1px solid #ffaa00;
      text-shadow: 0 0 10px rgba(255, 160, 0, 0.7);
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>

  <h1>Wallpaper Hub</h1>

  <div class="grid">
    <div class="card anime" onclick="alert('Anime wallpapers')">Anime</div>
    <div class="card nature" onclick="alert('Nature wallpapers')">Nature</div>
    <div class="card minimalist" onclick="alert('Minimalist wallpapers')">Minimalist</div>
    <div class="card festival" onclick="alert('Festival wallpapers')">Festival</div>
  </div>

  <footer>Click a section to explore wallpapers</footer>

</body>
</html>
